<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="UB Econometrics Quiz">
<title>University of Buckingham — Econometrics Quiz</title>
<style>
  :root {
    --ub-charcoal: #2A2F30;
    --ub-gold: #C9A227;
    --ub-gold-light: #E8D48B;
    --ub-cream: #FAF8F3;
    --ub-cream-dark: #F0EBE0;
    --ub-white: #FFFFFF;
    --ub-gray: #6E6E6E;
    --ub-light-gray: #E5E0D8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: var(--ub-cream);
    color: var(--ub-charcoal);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
  .container {
    width: 100%;
    max-width: 700px;
    background: var(--ub-white);
    border-radius: 24px;
    border: 1px solid var(--ub-light-gray);
    padding: 32px;
    box-shadow: 0 20px 60px rgba(42,47,48,0.12);
  }
  .logo-wrap {
    text-align: center;
    margin-bottom: 20px;
  }
  .logo-wrap img {
    max-width: 320px;
    width: 100%;
    height: auto;
  }
  h1 {
    text-align: center;
    font-size: 1.5rem;
    margin-bottom: 6px;
    color: var(--ub-charcoal);
    font-weight: 700;
  }
  .subtitle {
    text-align: center;
    color: var(--ub-gray);
    font-size: 0.95rem;
    margin-bottom: 24px;
  }
  .screen { display: none; }
  .screen.active { display: block; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  input[type="text"] {
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    border: 2px solid var(--ub-light-gray);
    background: var(--ub-cream);
    color: var(--ub-charcoal);
    font-size: 1.1rem;
    margin-bottom: 16px;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]::placeholder { color: var(--ub-gray); }
  input[type="text"]:focus { border-color: var(--ub-gold); }

  .btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 12px;
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 12px;
  }
  .btn-primary {
    background: var(--ub-gold);
    color: var(--ub-charcoal);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(201,162,39,0.35); }
  .btn-secondary {
    background: var(--ub-charcoal);
    color: var(--ub-white);
  }
  .btn-secondary:hover { background: #3d4445; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

  .progress-bar {
    height: 8px;
    background: var(--ub-light-gray);
    border-radius: 4px;
    margin-bottom: 24px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--ub-gold);
    border-radius: 4px;
    transition: width 0.3s ease;
  }
  .question-counter {
    text-align: right;
    color: var(--ub-gray);
    font-size: 0.85rem;
    margin-bottom: 8px;
  }
  .question-text {
    font-size: 1.15rem;
    line-height: 1.5;
    margin-bottom: 20px;
    font-weight: 600;
    color: var(--ub-charcoal);
  }
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .option {
    padding: 16px;
    border-radius: 12px;
    border: 2px solid var(--ub-light-gray);
    background: var(--ub-cream);
    cursor: pointer;
    transition: all 0.2s;
    font-size: 1rem;
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--ub-charcoal);
  }
  .option:hover { background: var(--ub-cream-dark); border-color: var(--ub-gold); }
  .option.selected { border-color: var(--ub-gold); background: rgba(201,162,39,0.08); }
  .option.correct { border-color: #2E7D32; background: rgba(46,125,50,0.08); }
  .option.wrong { border-color: #C62828; background: rgba(198,40,40,0.08); }
  .option-letter {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: var(--ub-light-gray);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    flex-shrink: 0;
    color: var(--ub-charcoal);
  }
  .option.correct .option-letter { background: #2E7D32; color: #fff; }
  .option.wrong .option-letter { background: #C62828; color: #fff; }

  .explanation {
    margin-top: 16px;
    padding: 16px;
    border-radius: 12px;
    background: var(--ub-cream);
    border-left: 4px solid var(--ub-gold);
    font-size: 0.95rem;
    line-height: 1.5;
    color: var(--ub-charcoal);
    display: none;
  }
  .explanation.show { display: block; animation: fadeIn 0.3s ease; }

  .result-circle {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: conic-gradient(var(--ub-gold) calc(var(--score) * 10%), var(--ub-light-gray) 0);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    position: relative;
  }
  .result-circle::before {
    content: '';
    position: absolute;
    width: 110px;
    height: 110px;
    border-radius: 50%;
    background: var(--ub-white);
  }
  .result-score {
    position: relative;
    font-size: 2.2rem;
    font-weight: 700;
    z-index: 1;
    color: var(--ub-charcoal);
  }
  .result-message {
    text-align: center;
    font-size: 1.2rem;
    margin-bottom: 24px;
    color: var(--ub-charcoal);
  }

  .leaderboard {
    margin-top: 20px;
  }
  .leaderboard h2 {
    font-size: 1.3rem;
    margin-bottom: 16px;
    text-align: center;
    color: var(--ub-charcoal);
  }
  .lb-date {
    text-align: center;
    color: var(--ub-gray);
    font-size: 0.9rem;
    margin-bottom: 16px;
  }
  .lb-row {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    border-radius: 10px;
    margin-bottom: 8px;
    background: var(--ub-cream);
    transition: background 0.2s;
    border: 1px solid var(--ub-light-gray);
  }
  .lb-row:hover { background: var(--ub-cream-dark); }
  .lb-rank {
    width: 32px;
    font-weight: 700;
    font-size: 1.1rem;
    color: var(--ub-charcoal);
  }
  .lb-rank.gold { color: var(--ub-gold); }
  .lb-rank.silver { color: #8E8E8E; }
  .lb-rank.bronze { color: #B87333; }
  .lb-name { flex: 1; font-size: 1rem; color: var(--ub-charcoal); }
  .lb-score {
    font-weight: 700;
    font-size: 1.1rem;
    color: var(--ub-gold);
  }
  .lb-time {
    font-size: 0.75rem;
    color: var(--ub-gray);
    margin-left: 8px;
  }
  .no-scores {
    text-align: center;
    color: var(--ub-gray);
    padding: 20px;
    font-style: italic;
  }

  .warning {
    background: var(--ub-cream);
    border-left: 4px solid var(--ub-gold);
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 16px;
    font-size: 0.9rem;
    color: var(--ub-charcoal);
  }

  .divider {
    height: 1px;
    background: var(--ub-light-gray);
    margin: 20px 0;
  }

  @media (max-width: 480px) {
    .container { padding: 20px; border-radius: 16px; }
    h1 { font-size: 1.3rem; }
    .question-text { font-size: 1rem; }
    .logo-wrap img { max-width: 240px; }
  }
</style>

<body>

<div class="container">

  <!-- LOGIN SCREEN -->
  <div id="screen-login" class="screen active">
    <div class="logo-wrap">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/06/The_University_of_BUckingham_Charcoal_Logo.png/1280px-The_University_of_BUckingham_Charcoal_Logo.png" alt="University of Buckingham">
    </div>
    <h1>Econometrics Quiz</h1>
    <p class="subtitle">Hypothesis Testing & Specification — University of Buckingham</p>
    <div class="warning">One attempt per person. Enter your name to begin.</div>
    <input type="text" id="playerName" placeholder="Your name" maxlength="20" autocomplete="off">
    <button class="btn btn-primary" onclick="startQuiz()">Start Quiz</button>
    <button class="btn btn-secondary" onclick="showLeaderboard()">View Leaderboard</button>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="screen-quiz" class="screen">
    <div class="question-counter" id="qCounter">Question 1 of 10</div>
    <div class="progress-bar"><div class="progress-fill" id="progressBar" style="width:10%"></div></div>
    <div class="question-text" id="questionText"></div>
    <div class="options" id="optionsBox"></div>
    <div class="explanation" id="explanationBox"></div>
    <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" style="margin-top:20px; display:none;">Next Question</button>
  </div>

  <!-- RESULT SCREEN -->
  <div id="screen-result" class="screen">
    <div class="logo-wrap">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/06/The_University_of_BUckingham_Charcoal_Logo.png/1280px-The_University_of_BUckingham_Charcoal_Logo.png" alt="University of Buckingham" style="max-width:200px;">
    </div>
    <h1>Quiz Complete!</h1>
    <div class="result-circle" id="resultCircle" style="--score:0;">
      <div class="result-score" id="resultScore">0/10</div>
    </div>
    <div class="result-message" id="resultMessage"></div>
    <button class="btn btn-primary" onclick="showLeaderboard()">View Leaderboard</button>
    <button class="btn btn-secondary" onclick="goHome()">Back to Home</button>
  </div>

  <!-- LEADERBOARD SCREEN -->
  <div id="screen-leaderboard" class="screen">
    <div class="logo-wrap">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/06/The_University_of_BUckingham_Charcoal_Logo.png/1280px-The_University_of_BUckingham_Charcoal_Logo.png" alt="University of Buckingham" style="max-width:200px;">
    </div>
    <h1>Leaderboard</h1>
    <p class="lb-date" id="lbDate"></p>
    <div class="leaderboard" id="leaderboardBox"></div>
    <button class="btn btn-secondary" onclick="goHome()" style="margin-top:20px;">Back to Home</button>
  </div>

</div>

<script>
const QUESTION_BANK = [
  {q:"What is the primary purpose of hypothesis testing in econometrics?",opts:["To prove a theory is correct","To state that a particular sample conforms to a particular hypothesis","To calculate the exact population parameter","To eliminate sampling error entirely"],ans:1,exp:"As stated in Lecture 3a: 'All that can be done with hypothesis testing is to state that a particular sample conforms to a particular hypothesis.' It is almost impossible to prove a theory is 'correct'."},
  {q:"Which of the following best describes a decision rule in hypothesis testing?",opts:["A method for collecting primary data","A method of deciding whether to reject a null hypothesis","A formula for calculating R-squared","A technique for selecting independent variables"],ans:1,exp:"Lecture 3a defines a decision rule as 'a method of deciding whether to reject a null hypothesis.'"},
  {q:"What divides the 'acceptance' and rejection regions in hypothesis testing?",opts:["The t-statistic","The standard error of the coefficient","The critical value","The p-value"],ans:2,exp:"Lecture 3a states: 'A critical value divides \"acceptance\" and rejection regions.'"},
  {q:"The t-test is primarily used to test hypotheses about:",opts:["The overall fit of the model","Individual slope coefficients","The error term variance","The functional form of the equation"],ans:1,exp:"According to Lecture 3a: 'The t-test is used to test hypotheses about individual slope coefficients.'"},
  {q:"In the t-statistic formula, the denominator represents:",opts:["The estimated coefficient","The standard error of the estimated coefficient","The R-squared value","The mean of the dependent variable"],ans:1,exp:"The t-statistic is calculated as the estimated coefficient divided by its estimated standard error (SE(β̂))."},
  {q:"In regression output, the numbers in parentheses underneath the estimated coefficients are:",opts:["t-values","Estimated standard errors","p-values","Critical values"],ans:1,exp:"Lecture 3a notes: 'The numbers in parentheses underneath the estimated regression coefficients are the estimated standard errors... and the numbers below them are t-values.'"},
  {q:"The level of significance indicates:",opts:["The probability of rejecting a true null hypothesis (Type I error)","The probability of observing an estimated t-value greater than the critical value if the null hypothesis were correct","The R-squared of the model","The minimum sample size required"],ans:1,exp:"Lecture 3a defines it as: 'The level of significance indicates the probability of observing an estimated t-value greater than the critical value if the null hypothesis were correct.'"},
  {q:"Unless there are unusual costs of Type I or Type II errors, what level of significance is generally recommended?",opts:["1 percent","5 percent","10 percent","50 percent"],ans:1,exp:"Lecture 3a recommends: 'Using a 5-percent level of significance is recommended unless you know something unusual about the relative costs of making Type I or Type II Errors.'"},
  {q:"In a one-sided t-test, you reject H₀ if:",opts:["t > t_c regardless of sign","|t| > t_c and the sign is in the expected direction","t < t_c always","R-squared increases"],ans:1,exp:"For a one-sided test, you reject H₀ if the calculated t exceeds the critical value AND has the expected sign. The Woody's example shows: 'Reject H₀ if |t| > t_c and if t_P is positive.'"},
  {q:"If you reject the null hypothesis at the 5-percent level, it is common to summarise that:",opts:["The theory is proven correct","The coefficient is statistically significant at the 5-percent level","The variable is economically important","The model is correctly specified"],ans:1,exp:"Lecture 3a states: 'If you can reject the null at the 5-percent level of significance, it is common to summarize and say: \"The coefficient is statistically significant at the 5-percent level.\"'"},
  {q:"In the Woody's restaurant example with 29 degrees of freedom, what is the appropriate one-tailed critical t-value at the 5-percent significance level?",opts:["1.645","1.699","2.045","2.756"],ans:1,exp:"The slides state: 'There are 29 degrees of freedom... so appropriate t_c at 5-percent significance: 1.699.'"},
  {q:"In a two-sided t-test whether an estimated coefficient is statistically different from zero, the null hypothesis states that the coefficient:",opts:["Is positive","Is negative","Equals zero","Equals one"],ans:2,exp:"The two-sided t-test example in Lecture 3a tests whether an estimated coefficient is statistically different than zero, implying H₀: β = 0."},
  {q:"With 29 degrees of freedom at the 5-percent significance level, what is the critical t-value for a two-tailed test?",opts:["1.699","2.045","2.462","2.756"],ans:1,exp:"The Woody's restaurant example uses 2.045 for a two-tailed test with 29 df at the 5% level."},
  {q:"If the calculated t-value is 2.37 and the critical t-value is 2.045 (two-tailed), what should you do?",opts:["Fail to reject H₀","Reject H₀","Increase the sample size","Change the significance level to 10%"],ans:1,exp:"Since 2.37 > 2.045, you reject the null hypothesis that the coefficient equals zero."},
  {q:"One major problem with the t-test is that it:",opts:["Cannot be calculated for small samples","Is easy to misuse","Only works for linear regression models","Requires normally distributed dependent variables only"],ans:1,exp:"Lecture 3a warns: 'One problem with the t-test is that it is easy to misuse.'"},
  {q:"The t-test does NOT test:",opts:["Statistical significance","Theoretical validity","Whether a coefficient is different from zero","The precision of estimation"],ans:1,exp:"Limitation 1: 'The t-test does not test theoretical validity.' The CPI and rainfall example illustrates that statistical significance does not imply meaningful economic relationship."},
  {q:"If a coefficient X₁ has a t-score of 10.0 compared to X₂ with 2.0, this means:",opts:["X₁ is more economically important than X₂","There is more evidence that X₁'s coefficient differs from zero","X₁ has a larger standard error than X₂","X₁ should always be retained in the model"],ans:1,exp:"Lecture 3a clarifies: 'That means is there is more evidence X₁'s coefficient is positive—does not mean more important.' A higher t-score indicates greater statistical significance, not importance."},
  {q:"The t-test is intended to make inferences about:",opts:["The entire population directly","The true value of a parameter from a sample of the population","The future values of the dependent variable","The causal relationships between all variables"],ans:1,exp:"Lecture 3a states: 'The t-test helps make inferences about the true value of a parameter from a sample of the population.'"},
  {q:"Which of the following is true about hypothesis testing?",opts:["It can definitively prove a theory is correct","It is almost impossible to prove a theory is 'correct'","It eliminates the need for economic theory","It only works with time-series data"],ans:1,exp:"Lecture 3a emphasises: 'It's almost impossible to prove a theory is \"correct\" with hypothesis testing.'"},
  {q:"Degrees of freedom for the t-test in multiple regression are calculated as:",opts:["N + K + 1","N − K − 1","N × K","K − N + 1"],ans:1,exp:"The Woody's example shows: 33 − 3 − 1 = 29 degrees of freedom, where N = sample size and K = number of independent variables."},
  {q:"For a two-tailed test, how many critical values are selected?",opts:["One","Two","Three","None"],ans:1,exp:"Lecture 3a states: 'For a two-tailed test, two critical values are selected.'"},
  {q:"If a researcher concludes that rainfall causes inflation because both variables have significant t-statistics in a regression, this illustrates:",opts:["Good econometric practice","The t-test does not test theoretical validity","The importance of high R-squared","The need for larger sample sizes"],ans:1,exp:"This is the CPI and rainfall example from Lecture 3a. It demonstrates that statistical significance does not imply theoretical validity or meaningful economic relationship."},
  {q:"'Statistically significant' does not necessarily mean:",opts:["The coefficient is different from zero","The result is economically important","The standard error is relatively small","The sample provides evidence against H₀"],ans:1,exp:"Lecture 3a distinguishes between statistical significance and importance. A variable can be highly significant but economically trivial."},
  {q:"The numbers located below the standard errors in regression output are:",opts:["Coefficients","Standard deviations","t-values","F-statistics"],ans:2,exp:"Lecture 3a explains: 'The numbers in parentheses underneath the estimated regression coefficients are the estimated standard errors of the estimated and the numbers below them are t-values.'"},
  {q:"A critical value is used primarily to:",opts:["Calculate the standard error of coefficients","Determine whether to reject the null hypothesis","Measure the overall fit of the model","Identify omitted variables"],ans:1,exp:"The critical value divides acceptance and rejection regions, thereby serving as the threshold for the decision rule."},
  {q:"Specifying an econometric equation does NOT consist of choosing:",opts:["The correct independent variables","The correct functional form","The correct form of the error term","The sample size"],ans:3,exp:"Lecture 3b states that specification consists of choosing: the correct independent variables, the correct functional form, and the correct form of the error term."},
  {q:"What is an omitted variable?",opts:["A variable with a low t-score","An important explanatory variable that has been left out of a regression equation","A variable with high multicollinearity","The dependent variable in the model"],ans:1,exp:"Lecture 3b defines: 'An omitted variable is defined as an important explanatory variable that has been left out of a regression equation.'"},
  {q:"Omitted variable bias occurs when:",opts:["A variable with t < 1 is excluded from the model","An important variable is left out and is correlated with included variables","R-squared is too high","The sample size is too small"],ans:1,exp:"Bias arises when an omitted relevant variable is correlated with included variables, violating Classical Assumption III."},
  {q:"The bias from an omitted variable does NOT exist if:",opts:["The sample size is very large","The true coefficient equals zero or the variables are uncorrelated in the sample","R-squared is high","The t-test is significant"],ans:1,exp:"Lecture 3b states: 'The bias exists unless: The true coefficient equals zero, or The included and omitted variables are uncorrelated in the sample.'"},
  {q:"In the Woody's restaurant model, which of the following is NOT one of the three location variables?",opts:["Income (N)","Population (P)","Competition (I)","Advertising (A)"],ans:3,exp:"The three location variables are Income (N), Population (P), and Competition (I). Advertising is not mentioned in the original specification."},
];

let currentQuestions = [];
let currentIndex = 0;
let score = 0;
let playerName = "";
let hasAnswered = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getToday() {
  return new Date().toISOString().split('T')[0];
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startQuiz() {
  const name = document.getElementById('playerName').value.trim();
  if (!name) {
    alert("Please enter your name to start.");
    return;
  }
  const attempts = JSON.parse(localStorage.getItem('quiz_attempts_two') || '[]');
  const alreadyPlayed = attempts.find(a => a.name === name);
  if (alreadyPlayed) {
    alert("You have already taken this quiz! View the leaderboard to see your score.");
    showLeaderboard();
    return;
  }
  playerName = name;
  currentQuestions = shuffle(QUESTION_BANK).slice(0, 10);
  currentIndex = 0;
  score = 0;
  hasAnswered = false;
  showScreen('screen-quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = currentQuestions[currentIndex];
  document.getElementById('qCounter').textContent = `Question ${currentIndex + 1} of 10`;
  document.getElementById('progressBar').style.width = `${(currentIndex + 1) * 10}%`;
  document.getElementById('questionText').textContent = q.q;
  const box = document.getElementById('optionsBox');
  box.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'option';
    div.innerHTML = `<div class="option-letter">${String.fromCharCode(65+i)}</div><div>${opt}</div>`;
    div.onclick = () => selectOption(i, div);
    box.appendChild(div);
  });
  document.getElementById('explanationBox').classList.remove('show');
  document.getElementById('nextBtn').style.display = 'none';
  hasAnswered = false;
}

function selectOption(idx, el) {
  if (hasAnswered) return;
  hasAnswered = true;
  const q = currentQuestions[currentIndex];
  const options = document.querySelectorAll('.option');
  options.forEach((opt, i) => {
    opt.style.pointerEvents = 'none';
    if (i === q.ans) opt.classList.add('correct');
    else if (i === idx && i !== q.ans) opt.classList.add('wrong');
  });
  if (idx === q.ans) score++;
  document.getElementById('explanationBox').textContent = q.exp;
  document.getElementById('explanationBox').classList.add('show');
  document.getElementById('nextBtn').style.display = 'block';
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex < 10) {
    renderQuestion();
  } else {
    finishQuiz();
  }
}

function finishQuiz() {
  const today = getToday();
  const attempts = JSON.parse(localStorage.getItem('quiz_attempts_two') || '[]');
  attempts.push({
    name: playerName,
    score: score,
    date: today,
    time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
  });
  localStorage.setItem('quiz_attempts_two', JSON.stringify(attempts));
  showScreen('screen-result');
  document.getElementById('resultCircle').style.setProperty('--score', score);
  document.getElementById('resultScore').textContent = `${score}/10`;
  let msg = "";
  if (score >= 8) msg = "Excellent! Strong mastery of econometric hypothesis testing and specification.";
  else if (score >= 5) msg = "Good effort. Review the concepts and try again tomorrow.";
  else msg = "Keep studying! Focus on hypothesis testing and specification bias, and retake the quiz.";
  document.getElementById('resultMessage').textContent = msg;
}

function showLeaderboard() {
  const attempts = JSON.parse(localStorage.getItem('quiz_attempts_two') || '[]');
  document.getElementById('lbDate').textContent = `${attempts.length} player${attempts.length !== 1 ? 's' : ''} have taken the quiz`;
  attempts.sort((a, b) => b.score - a.score || a.time.localeCompare(b.time));
  const box = document.getElementById('leaderboardBox');
  box.innerHTML = '';
  if (attempts.length === 0) {
    box.innerHTML = '<div class="no-scores">No scores yet. Be the first to play!</div>';
  }
  else {
    attempts.forEach((entry, i) => {
      const row = document.createElement('div');
      row.className = 'lb-row';
      let rankClass = '';
      if (i === 0) rankClass = 'gold';
      else if (i === 1) rankClass = 'silver';
      else if (i === 2) rankClass = 'bronze';
      row.innerHTML = `
        <div class="lb-rank ${rankClass}">#${i + 1}</div>
        <div class="lb-name">${entry.name}</div>
        <div class="lb-score">${entry.score}/10</div>
        <div class="lb-time">${entry.date}</div>
      `;
      box.appendChild(row);
    });
  }
  showScreen('screen-leaderboard');
}

function goHome() {
  document.getElementById('playerName').value = '';
  showScreen('screen-login');
}
</script>
</body>
</html>
